plugins {
    id 'java'
    id 'com.gradleup.shadow' version '9.4.2'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
    implementation 'com.google.code.gson:gson:2.14.0'
    implementation 'org.jetbrains:annotations:26.0.2'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.slf4j:slf4j-api:2.0.17'
    implementation 'org.slf4j:slf4j-simple:2.0.17'
    // Servidor IPC local embebido (HTTP + WebSocket) para hablar con el frontend.
    implementation 'io.javalin:javalin:6.7.0'
}

jar {
    manifest {
        attributes 'Main-Class': 'f24launcher.App'
    }
}

shadowJar {
    archiveBaseName.set("${project.archive_base_name}")
    archiveVersion.set("${project.archive_version}")
    archiveClassifier.set("${project.archive_classifier}")
    manifest {
        attributes 'Main-Class': 'f24launcher.App'
    }
}

tasks.register('run', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'f24launcher.App'
}

tasks.named('jar').configure { enabled = false }

// ─── JRE recortado (jlink) para el empaquetado Tauri/NSIS ───
//
// `buildInstaller` (en el build.gradle raíz) consume este runtime como recurso
// del instalador para no depender de que el usuario tenga Java instalado.

def jlinkModules = 'java.base,java.compiler,java.desktop,java.logging,java.management,java.naming,java.net.http,java.security.jgss,java.sql,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.unsupported,jdk.zipfs'
def runtimeDir = layout.buildDirectory.dir('jlink-runtime').get().asFile

tasks.register('jlinkRuntime', Exec) {
    group = 'distribution'
    dependsOn 'shadowJar'
    outputs.upToDateWhen { false }

    def javaHome = System.getProperty('java.home') ?: System.getenv('JAVA_HOME')
    def isWin = System.getProperty('os.name').toLowerCase().contains('win')
    def jlinkExe = "${javaHome}/bin/jlink" + (isWin ? '.exe' : '')

    doFirst {
        if (runtimeDir.exists()) runtimeDir.deleteDir()
    }

    commandLine jlinkExe,
        '--add-modules', jlinkModules,
        '--strip-debug',
        '--no-man-pages',
        '--no-header-files',
        '--compress=zip-9',
        '--output', runtimeDir.absolutePath

    // jlink no incluye el archivo CDS base (lib/server/classes.jsa). Sin él, el
    // AppCDS del backend (-XX:+AutoCreateSharedArchive) no funciona. Lo generamos
    // con -Xshare:dump sobre el runtime recién creado.
    doLast {
        def javaExe = new File(runtimeDir, isWin ? 'bin/java.exe' : 'bin/java')
        def proc = new ProcessBuilder(javaExe.absolutePath, '-Xshare:dump')
                .redirectErrorStream(true).start()
        def out = proc.inputStream.text
        if (proc.waitFor() != 0) throw new GradleException("Falló -Xshare:dump:\n${out}")
        println "Archivo CDS base generado en el runtime jlink."
    }
}
